<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots Game - Full Sound & Bonus Version</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            background: #121212; color: #e0e0e0; font-family: sans-serif;
        }
        #info-container { 
            display: flex; gap: 30px; font-size: 24px; margin-bottom: 20px; font-weight: bold; 
        }
        .info-item { min-width: 120px; text-align: center; }
        canvas { background: #1e1e1e; border-radius: 12px; cursor: crosshair; touch-action: none; display: block; }
        #controls { margin-top: 25px; display: flex; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border-radius: 30px; border: 1px solid #444; background: #2c2c2c; color: #fff; cursor: pointer; }
        button:active { background: #3d3d3d; }
        #undoBtn { border-color: #448AFF; color: #448AFF; }
        #resetBtn { border-color: #FF5252; color: #FF5252; }
        #bonus-msg { position: absolute; top: 80px; color: #FFEB3B; font-weight: bold; font-size: 20px; pointer-events: none; opacity: 0; transition: 0.3s; z-index: 10; text-align: center; width: 100%; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="bonus-msg">BONUS!</div>

<div id="info-container">
    <div class="info-item">Score: <span id="score">0</span></div>
    <div class="info-item">Time: <span id="timer">00:00</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <button id="undoBtn">Undo <span style="font-size:0.8em; color:#aaa;">(-5)</span></button>
    <button id="resetBtn">Reset</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const bonusMsgEl = document.getElementById('bonus-msg');

    const ROWS = 6, COLS = 6;
    const DOT_SIZE = 11, SPACING = 50;
    const COLORS = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#9C27B0'];
    const UNDO_COST = 5;

    let grid = [];
    let score = parseInt(localStorage.getItem('dotsGameScore') || '0', 10);
    let selectedPath = [], isDragging = false, isLooping = false;
    let history = [], startTime = null, timerInterval = null, particles = [];
    let loopCombo = 0, isShuffling = false, audioCtx = null;

    // --- 音響システム ---
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playDotSound(step, isSpecial = false) {
        initAudio(); if (!audioCtx) return;
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
        let freq = scale[Math.min(step, scale.length - 1)];
        if (isSpecial) freq *= 2.0;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playClearSound(isLoop = false) {
        initAudio(); if (!audioCtx) return;
        const freqs = isLoop ? [523.25, 659.25, 783.99, 1046.50] : [523.25, 659.25, 783.99];
        freqs.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + i*0.05);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i*0.05); osc.stop(audioCtx.currentTime + 0.4);
        });
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 3 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0; this.decay = 0.03;
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += 0.1; this.life -= this.decay; }
        draw(ctx) {
            if (this.life <= 0) return;
            ctx.save(); ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }
    }

    function initGrid() {
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) grid[r][c] = { color: COLORS[Math.floor(Math.random()*COLORS.length)], visualY: r*SPACING+25, targetY: r*SPACING+25, vy: 0 };
        }
        if (!hasPossibleMoves()) shuffleGrid();
    }

    function updateScore(v) { score = Math.max(0, v); scoreEl.innerText = score; localStorage.setItem('dotsGameScore', score); }

    function startTimer() {
        if (timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            const sec = Math.floor((Date.now() - startTime) / 1000);
            timerEl.innerText = `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    function saveHistory() {
        const gridCopy = grid.map(row => row.map(dot => dot ? {...dot} : null));
        history.push({ grid: gridCopy, score: score });
        if (history.length > 10) history.shift();
    }

    function showBonus(txt) {
        bonusMsgEl.innerText = txt; bonusMsgEl.style.opacity = 1; bonusMsgEl.style.transform = "translateY(-10px)";
        setTimeout(() => { bonusMsgEl.style.opacity = 0; bonusMsgEl.style.transform = "translateY(0)"; }, 1500);
    }

    function calculateSpecialBonuses() {
        let bonus = 0; let msgs = [];
        if (selectedPath.length === 6) {
            const allSameRow = selectedPath.every(p => p.r === selectedPath[0].r);
            const allSameCol = selectedPath.every(p => p.c === selectedPath[0].c);
            if (allSameRow || allSameCol) { bonus += 5; msgs.push("Straight 6! +5"); }
        }
        if (isLooping) {
            loopCombo++;
            if (loopCombo >= 2) {
                const comboPts = (loopCombo - 1) * 5;
                bonus += comboPts; msgs.push(`${loopCombo} Loop Combo! +${comboPts}`);
            }
            const rows = selectedPath.map(p => p.r), cols = selectedPath.map(p => p.c);
            const h = Math.max(...rows) - Math.min(...rows) + 1;
            const w = Math.max(...cols) - Math.min(...cols) + 1;
            if (h === w && h >= 3) {
                const sqPts = { 3: 10, 4: 20, 5: 30, 6: 50 }[h] || 0;
                bonus += sqPts; msgs.push(`${h}x${h} Square! +${sqPts}`);
            }
        } else { loopCombo = 0; }
        if (msgs.length > 0) showBonus(msgs.join("\n"));
        return bonus;
    }

    function hasPossibleMoves() {
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
            const dot = grid[r][c]; if (!dot) continue;
            for (const [dr, dc] of [[1, 0], [0, 1]]) {
                const nr = r + dr, nc = c + dc;
                if (nr < ROWS && nc < COLS && grid[nr][nc]?.color === dot.color) return true;
            }
        }
        return false;
    }

    function shuffleGrid() {
        const colors = [];
        grid.forEach(row => row.forEach(d => d && colors.push(d.color)));
        for (let i = colors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [colors[i], colors[j]] = [colors[j], colors[i]];
        }
        let idx = 0;
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c]) grid[r][c].color = colors[idx++];
    }

    function startShuffleAnimation() {
        isShuffling = true;
        let count = 0;
        const interval = setInterval(() => {
            shuffleGrid();
            if (++count > 8 && hasPossibleMoves()) { clearInterval(interval); isShuffling = false; }
        }, 100);
    }

    function dropDots() {
        for (let c = 0; c < COLS; c++) {
            let empty = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (!grid[r][c]) empty++;
                else if (empty > 0) {
                    grid[r + empty][c] = grid[r][c];
                    grid[r + empty][c].targetY = (r + empty) * SPACING + 25;
                    grid[r][c] = null;
                }
            }
            for (let r = 0; r < empty; r++) {
                grid[r][c] = { color: COLORS[Math.floor(Math.random()*COLORS.length)], visualY: (r-empty)*SPACING, targetY: r*SPACING+25, vy: 10 };
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => { p.update(); p.draw(ctx); if (p.life <= 0) particles.splice(i, 1); });

        if (selectedPath.length > 0) {
            ctx.beginPath(); ctx.lineWidth = 6; ctx.strokeStyle = grid[selectedPath[0].r][selectedPath[0].c].color;
            selectedPath.forEach((p, i) => {
                const x = p.c * SPACING + 25, y = grid[p.r][p.c].visualY;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
            const dot = grid[r][c]; if (!dot) continue;
            dot.vy += (dot.targetY - dot.visualY) * 0.15; dot.vy *= 0.6; dot.visualY += dot.vy;
            ctx.save(); ctx.translate(c*SPACING+25, dot.visualY);
            ctx.beginPath(); ctx.arc(0, 0, DOT_SIZE, 0, Math.PI*2); ctx.fillStyle = dot.color; ctx.fill();
            if (selectedPath.some(p => p.r === r && p.c === c)) { ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke(); }
            ctx.restore();
        }
        requestAnimationFrame(draw);
    }

    const getPos = (e) => {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        const c = Math.floor((t.clientX - rect.left) / SPACING), r = Math.floor((t.clientY - rect.top) / SPACING);
        return (r >= 0 && r < ROWS && c >= 0 && c < COLS) ? { r, c } : null;
    };

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault(); if (isShuffling) return; 
        initAudio(); // 音声コンテキストの有効化
        startTimer();
        const pos = getPos(e);
        if (pos && grid[pos.r][pos.c]) { 
            isDragging = true; selectedPath = [pos]; isLooping = false; 
            playDotSound(0);
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const pos = getPos(e); if (!pos) return;
        const last = selectedPath[selectedPath.length - 1];
        if (pos.r === last.r && pos.c === last.c) return;
        if (Math.abs(pos.r - last.r) + Math.abs(pos.c - last.c) !== 1) return;
        if (grid[pos.r][pos.c].color !== grid[selectedPath[0].r][selectedPath[0].c].color) return;

        const idx = selectedPath.findIndex(p => p.r === pos.r && p.c === pos.c);
        if (idx === -1) { 
            selectedPath.push(pos); isLooping = false; 
            playDotSound(selectedPath.length - 1);
        }
        else if (idx === selectedPath.length - 2) { 
            selectedPath.pop(); isLooping = false; 
        }
        else if (selectedPath.length >= 3) { 
            isLooping = true; selectedPath.push(pos); 
            playDotSound(selectedPath.length - 1, true); // ループ時は高音
        }
    });

    canvas.addEventListener('touchend', () => {
        if (!isDragging) return; isDragging = false;
        if (selectedPath.length >= 2) {
            saveHistory();
            const color = grid[selectedPath[0].r][selectedPath[0].c].color;
            let baseScore = 0;
            playClearSound(isLooping); // 消去音

            if (isLooping) {
                for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]?.color === color) {
                        particles.push(new Particle(c*SPACING+25, grid[r][c].visualY, color));
                        grid[r][c] = null; baseScore++;
                    }
                }
            } else {
                selectedPath.forEach(p => {
                    if (grid[p.r][p.c]) {
                        particles.push(new Particle(p.c*SPACING+25, grid[p.r][p.c].visualY, color));
                        grid[p.r][p.c] = null; baseScore++;
                    }
                });
            }

            const specialBonus = calculateSpecialBonuses();
            updateScore(score + baseScore + specialBonus);
            dropDots();
            setTimeout(() => { if (!hasPossibleMoves()) startShuffleAnimation(); }, 500);
        }
        selectedPath = []; isLooping = false;
    });

    document.getElementById('undoBtn').addEventListener('click', () => {
        initAudio();
        if (history.length > 0 && score >= UNDO_COST) {
            const last = history.pop(); grid = last.grid; updateScore(score - UNDO_COST);
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        if(confirm("Scoreをリセットしますか？")) { localStorage.clear(); location.reload(); }
    });

    canvas.width = COLS * SPACING; canvas.height = ROWS * SPACING;
    initGrid(); updateScore(score); requestAnimationFrame(draw);
</script>
</body>
</html>
