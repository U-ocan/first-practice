<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');

    const ROWS = 6;
    const COLS = 6;
    const DOT_SIZE = 13; 
    const SPACING = 50;
    const COLORS = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#9C27B0'];

    const BOUNCE_STRENGTH = 0.15; 
    const FRICTION = 0.6;        

    let grid = [];
    // ★ localStorage からスコアを復元（なければ 0）
    let score = parseInt(localStorage.getItem('dotsGameScore') || '0', 10);
    let selectedPath = [];
    let isDragging = false;
    let isLooping = false;
    let loopStartPos = null;
    let history = [];
    const UNDO_COST = 5;

    let startTime;
    let timerInterval = null;
    // ★ タイマーの経過秒数（リセット管理用）
    let elapsedSeconds = 0;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playDotSound(step, isSpecial = false) {
        if (!audioCtx) return;
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
        let freq = scale[Math.min(step, scale.length - 1)];
        if (isSpecial) freq *= 2.0;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playClearSound(isLoop = false) {
        if (!audioCtx) return;
        const freqs = isLoop ? [523.25, 659.25, 783.99, 1046.50] : [523.25, 659.25, 783.99];
        freqs.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        });
    }

    function startTimer() {
        if (timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
        const secs = (elapsedSeconds % 60).toString().padStart(2, '0');
        timerEl.innerText = `${mins}:${secs}`;
    }

    // ★ スコアを更新して localStorage に保存
    function updateScore(newScore) {
        score = newScore;
        scoreEl.innerText = score;
        localStorage.setItem('dotsGameScore', score);
    }

    // ★ リセットボタン → 確認ダイアログを表示
    function resetGame() {
        document.getElementById('confirm-overlay').classList.add('show');
    }

    function cancelReset() {
        document.getElementById('confirm-overlay').classList.remove('show');
    }

    function confirmReset() {
        document.getElementById('confirm-overlay').classList.remove('show');

        // タイマー停止・リセット
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        elapsedSeconds = 0;
        timerEl.innerText = '00:00';

        // スコアリセット
        updateScore(0);

        // 履歴・ドラッグ状態リセット
        history = [];
        selectedPath = [];
        isDragging = false;
        isLooping = false;
        loopStartPos = null;

        // グリッド再生成
        grid = [];
        initGrid();
    }

    function initGrid() {
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = createDot(r, c, COLORS[Math.floor(Math.random() * COLORS.length)]);
            }
        }
        ensurePossibleMoves();
    }

    function createDot(r, c, color) {
        return {
            color: color,
            visualY: r * SPACING + SPACING / 2,
            targetY: r * SPACING + SPACING / 2,
            vy: 0
        };
    }

    function hasPossibleMoves() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const dot = grid[r][c];
                if (!dot) continue;
                const neighbors = [ {r: r+1, c: c}, {r: r-1, c: c}, {r: r, c: c+1}, {r: r, c: c-1} ];
                for (let n of neighbors) {
                    if (n.r >= 0 && n.r < ROWS && n.c >= 0 && n.c < COLS) {
                        if (grid[n.r][n.c] && grid[n.r][n.c].color === dot.color) return true;
                    }
                }
            }
        }
        return false;
    }

    function shuffleGrid() {
        let allColors = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) allColors.push(grid[r][c].color);
            }
        }
        for (let i = allColors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allColors[i], allColors[j]] = [allColors[j], allColors[i]];
        }
        let idx = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c].color = allColors[idx++];
            }
        }
    }

    function ensurePossibleMoves() {
        let attempts = 0;
        while (!hasPossibleMoves() && attempts < 100) {
            shuffleGrid();
            attempts++;
        }
    }

    function saveState() {
        const state = { grid: grid.map(row => row.map(d => ({...d}))), score: score };
        history.push(JSON.stringify(state));
        if (history.length > 20) history.shift();
    }

    function undo() {
        initAudio();
        if (history.length > 0 && score >= UNDO_COST) {
            updateScore(score - UNDO_COST);
            const lastState = JSON.parse(history.pop());
            grid = lastState.grid;
        } else if (score < UNDO_COST) {
            scoreEl.style.color = '#FF5252';
            setTimeout(() => scoreEl.style.color = '#e0e0e0', 500);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (selectedPath.length > 0) {
            const color = grid[selectedPath[0].r][selectedPath[0].c].color;
            ctx.beginPath();
            ctx.lineWidth = 6; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            selectedPath.forEach((p, i) => {
                const x = p.c * SPACING + SPACING / 2;
                const dot = grid[p.r][p.c];
                const y = dot ? dot.visualY : p.r * SPACING + SPACING / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            if (isLooping && loopStartPos) {
                ctx.beginPath();
                ctx.lineWidth = 8; ctx.strokeStyle = 'white';
                let startDrawing = false;
                selectedPath.forEach((p, i) => {
                    if (p.r === loopStartPos.r && p.c === loopStartPos.c) startDrawing = true;
                    if (startDrawing) {
                        const x = p.c * SPACING + SPACING / 2;
                        const dot = grid[p.r][p.c];
                        const y = dot ? dot.visualY : p.r * SPACING + SPACING / 2;
                        if (i === selectedPath.findIndex(lp => lp.r === loopStartPos.r && lp.c === loopStartPos.c)) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }
        }

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const dot = grid[r][c];
                if (dot) {
                    let ay = (dot.targetY - dot.visualY) * BOUNCE_STRENGTH;
                    dot.vy += ay;
                    dot.vy *= FRICTION;
                    dot.visualY += dot.vy;
                    
                    const x = c * SPACING + SPACING / 2;
                    ctx.beginPath();
                    ctx.arc(x, dot.visualY, DOT_SIZE, 0, Math.PI * 2);
                    ctx.fillStyle = dot.color;
                    ctx.fill();
                    
                    if (selectedPath.some(p => p.r === r && p.c === c)) {
                        ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
                    }
                }
            }
        }
        requestAnimationFrame(draw);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const c = Math.floor((clientX - rect.left) / SPACING);
        const r = Math.floor((clientY - rect.top) / SPACING);
        return (r >= 0 && r < ROWS && c >= 0 && c < COLS) ? {r, c} : null;
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        startTimer();
        saveState();
        const pos = getPos(e);
        if (pos && grid[pos.r][pos.c]) {
            isDragging = true; selectedPath = [pos]; isLooping = false; loopStartPos = null;
            playDotSound(0);
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const pos = getPos(e); if (!pos) return;
        const last = selectedPath[selectedPath.length - 1];
        if (pos.r === last.r && pos.c === last.c) return;
        
        const color = grid[selectedPath[0].r][selectedPath[0].c].color;
        const rDiff = Math.abs(pos.r - last.r);
        const cDiff = Math.abs(pos.c - last.c);
        
        if (grid[pos.r][pos.c] && grid[pos.r][pos.c].color === color && (rDiff + cDiff === 1)) {
            const alreadyIdx = selectedPath.findIndex(p => p.r === pos.r && p.c === pos.c);
            if (alreadyIdx === -1) {
                selectedPath.push(pos);
                playDotSound(selectedPath.length - 1, isLooping);
            } else if (selectedPath.length >= 3 && alreadyIdx !== selectedPath.length - 2) {
                selectedPath.push(pos);
                isLooping = true;
                loopStartPos = pos;
                playDotSound(selectedPath.length - 1, true);
            }
        }
    });

    window.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        
        if (isLooping && selectedPath.length >= 4 && loopStartPos) {
            const color = grid[selectedPath[0].r][selectedPath[0].c].color;
            playClearSound(true);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] && grid[r][c].color === color) { grid[r][c] = null; score++; }
                }
            }
            dropDots(); ensurePossibleMoves();
        } else if (selectedPath.length >= 2) {
            playClearSound(false);
            const ptsToRemove = new Set(selectedPath.map(p => `${p.r},${p.c}`));
            ptsToRemove.forEach(pt => {
                const [r, c] = pt.split(',').map(Number);
                if (grid[r][c]) { grid[r][c] = null; score++; }
            });
            dropDots(); ensurePossibleMoves();
        }
        // ★ updateScore() 経由で localStorage にも保存
        updateScore(score);
        selectedPath = []; isLooping = false; loopStartPos = null;
    });

    function dropDots() {
        for (let c = 0; c < COLS; c++) {
            let empty = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r][c] === null) {
                    empty++;
                } else if (empty > 0) {
                    grid[r + empty][c] = grid[r][c];
                    grid[r + empty][c].targetY = (r + empty) * SPACING + SPACING / 2;
                    grid[r][c] = null;
                }
            }
            for (let r = 0; r < empty; r++) {
                const newColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                grid[r][c] = createDot(r, c, newColor);
                grid[r][c].visualY = (r - empty) * SPACING - 50; 
                grid[r][c].vy = 15; 
            }
        }
    }

    canvas.width = COLS * SPACING; canvas.height = ROWS * SPACING;
    initGrid();
    // ★ 復元したスコアを画面に反映
    scoreEl.innerText = score;
    requestAnimationFrame(draw);

    // ★ ダイアログボタン：touch-action:none の影響を避けるため touchend + click 両対応
    document.getElementById('cancelBtn').addEventListener('touchend', (e) => { e.preventDefault(); cancelReset(); });
    document.getElementById('cancelBtn').addEventListener('click', cancelReset);
    document.getElementById('confirmBtn').addEventListener('touchend', (e) => { e.preventDefault(); confirmReset(); });
    document.getElementById('confirmBtn').addEventListener('click', confirmReset);
</script>

</body>
