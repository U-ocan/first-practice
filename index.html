<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots Game - Burst Effect</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            background: #121212; color: #e0e0e0; font-family: sans-serif;
        }
        #info-container { 
            display: flex; gap: 30px; font-size: 24px; margin-bottom: 20px; font-weight: bold; 
        }
        .info-item { min-width: 120px; text-align: center; }
        canvas { background: #1e1e1e; border-radius: 12px; cursor: crosshair; touch-action: none; display: block; }
        #controls { margin-top: 25px; display: flex; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border-radius: 30px; border: 1px solid #444; background: #2c2c2c; color: #fff; cursor: pointer; }
        button:active { background: #3d3d3d; }
        #resetBtn { border-color: #FF5252; color: #FF5252; }
        #resetBtn:active { background: #3d1a1a; }
        .cost-label { font-size: 0.8em; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

<div id="info-container">
    <div class="info-item">Score: <span id="score">0</span></div>
    <div class="info-item">Time: <span id="timer">00:00</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <button id="undoBtn">Undo <span class="cost-label">(-5pts)</span></button>
    <button id="resetBtn">Reset</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');

    const ROWS = 6, COLS = 6;
    const DOT_SIZE = 11;
    const SPACING = 50;
    const COLORS = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#9C27B0'];
    const BOUNCE_STRENGTH = 0.17;
    const FRICTION = 0.5;
    const UNDO_COST = 5;

    let grid = [];
    let score = parseInt(localStorage.getItem('dotsGameScore') || '0', 10);
    let selectedPath = [];
    let isDragging = false;
    let isLooping = false;
    let loopStartPos = null;
    let history = [];
    let startTime, timerInterval = null, elapsedSeconds = 0;

    let showConfirm = false;
    let isShuffling = false;
    let shuffleScale = 1.0;
    let shuffleRotation = 0;
    let dlgCancelBtn = null, dlgOkBtn = null;

    let audioCtx = null;
    let particles = []; // パーティクルを格納する配列

    // --- パーティクルクラスの定義 ---
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            // 弾ける速度と方向をランダムに設定
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 4 + 2; 
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.life = 1.0; // 寿命（透明度） 1.0 -> 0.0
            this.decay = Math.random() * 0.03 + 0.02; // 消える速度
            this.size = Math.random() * 3 + 2; // 粒の大きさ
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            // 重力（少し下に落ちる）と摩擦
            this.vy += 0.1;
            this.vx *= 0.95;
            this.vy *= 0.95;
            this.life -= this.decay;
        }

        draw(ctx) {
            if (this.life <= 0) return;
            ctx.save();
            ctx.globalAlpha = this.life; // 透明度を適用
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // --- 既存の関数群 ---
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playDotSound(step, isSpecial = false) {
        initAudio();
        if (!audioCtx) return;
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
        let freq = scale[Math.min(step, scale.length - 1)];
        if (isSpecial) freq *= 2.0;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playClearSound(isLoop = false) {
        initAudio();
        if (!audioCtx) return;
        const freqs = isLoop ? [523.25, 659.25, 783.99, 1046.50] : [523.25, 659.25, 783.99];
        freqs.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        });
    }

    function playShuffleSound() {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.6);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.6);
    }

    function startTimer() {
        if (timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(() => {
            elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsedSeconds / 60).toString().padStart(2, '0');
            const s = (elapsedSeconds % 60).toString().padStart(2, '0');
            timerEl.innerText = `${m}:${s}`;
        }, 1000);
    }

    function updateScore(v) {
        score = v;
        scoreEl.innerText = score;
        localStorage.setItem('dotsGameScore', score);
    }

    function createDot(r, c, color) {
        return { color, visualY: r*SPACING + SPACING/2, targetY: r*SPACING + SPACING/2, vy: 0 };
    }

    function initGrid() {
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++)
                grid[r][c] = createDot(r, c, COLORS[Math.floor(Math.random()*COLORS.length)]);
        }
        ensurePossibleMoves(false);
    }

    function hasPossibleMoves() {
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
            const dot = grid[r][c]; if (!dot) continue;
            for (const [dr,dc] of [[1,0],[-1,0],[0,1],[0,-1]]) {
                const nr=r+dr, nc=c+dc;
                if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc]?.color===dot.color) return true;
            }
        }
        return false;
    }

    function shuffleGrid() {
        const all = [];
        for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if(grid[r][c]) all.push(grid[r][c].color);
        for (let i=all.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
        let idx=0;
        for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) grid[r][c].color=all[idx++];
    }

    function ensurePossibleMoves(animate = true) {
        if (!hasPossibleMoves()) {
            if (animate && !isShuffling) {
                startShuffleAnimation();
            } else if (!animate) {
                let n=0; while(!hasPossibleMoves()&&n++<100) shuffleGrid();
            }
        }
    }

    function startShuffleAnimation() {
        isShuffling = true;
        playShuffleSound();
        let duration = 30;
        let frame = 0;
        const outInt = setInterval(() => {
            frame++;
            shuffleScale = 1.0 - (frame / duration);
            shuffleRotation += 0.2;
            if (frame >= duration) {
                clearInterval(outInt);
                shuffleGrid();
                while(!hasPossibleMoves()) shuffleGrid();
                frame = 0;
                const inInt = setInterval(() => {
                    frame++;
                    shuffleScale = frame / duration;
                    shuffleRotation += 0.2;
                    if (frame >= duration) {
                        clearInterval(inInt);
                        shuffleScale = 1.0;
                        shuffleRotation = 0;
                        isShuffling = false;
                    }
                }, 16);
            }
        }, 16);
    }

    function saveState() {
        history.push(JSON.stringify({grid:grid.map(row=>row.map(d=>({...d}))),score}));
        if(history.length>20) history.shift();
    }

    function dropDots() {
        for (let c=0;c<COLS;c++) {
            let empty=0;
            for (let r=ROWS-1;r>=0;r--) {
                if(!grid[r][c]){empty++;}
                else if(empty>0){
                    grid[r+empty][c]=grid[r][c];
                    grid[r+empty][c].targetY=(r+empty)*SPACING+SPACING/2;
                    grid[r][c]=null;
                }
            }
            for (let r=0;r<empty;r++) {
                grid[r][c]=createDot(r,c,COLORS[Math.floor(Math.random()*COLORS.length)]);
                grid[r][c].visualY=(r-empty)*SPACING-50;
                grid[r][c].vy=15;
            }
        }
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
        ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
        ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
        ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
        ctx.closePath();
    }

    function drawConfirmDialog() {
        const cx = canvas.width/2, cy = canvas.height/2;
        const dw = 220, dh = 130;
        const dx = cx-dw/2, dy = cy-dh/2;
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2c2c2c';
        roundRect(dx, dy, dw, dh, 14); ctx.fill();
        ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
        roundRect(dx, dy, dw, dh, 14); ctx.stroke();
        ctx.fillStyle = '#e0e0e0'; ctx.textAlign = 'center'; ctx.font = '14px sans-serif';
        ctx.fillText('スコアとタイマーを', cx, cy - 26);
        ctx.fillText('リセットしますか？', cx, cy - 8);
        const bw=88, bh=34, gap=12, totalBW = bw*2+gap, cancelX = cx - totalBW/2, okX = cancelX + bw + gap, btnY = cy + 14;
        dlgCancelBtn = {x:cancelX, y:btnY, w:bw, h:bh};
        dlgOkBtn     = {x:okX,     y:btnY, w:bw, h:bh};
        ctx.fillStyle = '#3a3a3a'; roundRect(cancelX, btnY, bw, bh, 17); ctx.fill();
        ctx.fillStyle = '#ccc'; ctx.fillText('キャンセル', cancelX+bw/2, btnY+22);
        ctx.fillStyle = '#1a0a0a'; roundRect(okX, btnY, bw, bh, 17); ctx.fill();
        ctx.strokeStyle = '#FF5252'; roundRect(okX, btnY, bw, bh, 17); ctx.stroke();
        ctx.fillStyle = '#FF5252'; ctx.fillText('リセット', okX+bw/2, btnY+22);
    }

    function hitBtn(btn, x, y) { return btn && x>=btn.x && x<=btn.x+btn.w && y>=btn.y && y<=btn.y+btn.h; }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- パーティクルの更新と描画 ---
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw(ctx);
            // 寿命が尽きたパーティクルを削除
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
            }
        }

        // --- 既存の描画処理 ---
        // パスの描画
        if (selectedPath.length > 0 && !isShuffling) {
            const color = grid[selectedPath[0].r][selectedPath[0].c].color;
            ctx.beginPath();
            ctx.lineWidth=6; ctx.lineJoin='round'; ctx.lineCap='round';
            ctx.strokeStyle=color;
            selectedPath.forEach((p,i) => {
                const x=p.c*SPACING+SPACING/2;
                const y=grid[p.r][p.c]?.visualY ?? p.r*SPACING+SPACING/2;
                i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            });
            ctx.stroke();
        }

        // ドットの描画
        for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
            const dot=grid[r][c]; if(!dot) continue;
            if (!isShuffling) {
                dot.vy += (dot.targetY-dot.visualY)*BOUNCE_STRENGTH;
                dot.vy *= FRICTION;
                dot.visualY += dot.vy;
            }
            const x=c*SPACING+SPACING/2;
            ctx.save();
            ctx.translate(x, dot.visualY);
            if (isShuffling) {
                ctx.scale(shuffleScale, shuffleScale);
                ctx.rotate(shuffleRotation);
            }
            ctx.beginPath();
            ctx.arc(0, 0, DOT_SIZE, 0, Math.PI*2);
            ctx.fillStyle=dot.color; ctx.fill();
            if (selectedPath.some(p=>p.r===r&&p.c===c) && !isShuffling) {
                ctx.lineWidth=3; ctx.strokeStyle='white'; ctx.stroke();
            }
            ctx.restore();
        }

        if (showConfirm) drawConfirmDialog();
        requestAnimationFrame(draw);
    }

    function getCanvasXY(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    function getGridPos(x, y) {
        const c=Math.floor(x/SPACING), r=Math.floor(y/SPACING);
        return (r>=0&&r<ROWS&&c>=0&&c<COLS) ? {r,c} : null;
    }

    // --- タッチイベント群 ---
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        if (isShuffling) return;
        const {x, y} = getCanvasXY(e);
        if (showConfirm) {
            if (hitBtn(dlgCancelBtn, x, y)) { showConfirm = false; }
            else if (hitBtn(dlgOkBtn, x, y)) { showConfirm = false; execReset(); }
            return;
        }
        startTimer(); saveState();
        const pos = getGridPos(x, y);
        if (pos && grid[pos.r][pos.c]) {
            isDragging=true; selectedPath=[pos]; isLooping=false; loopStartPos=null;
            playDotSound(0);
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (showConfirm || !isDragging || isShuffling) return;
        const {x, y} = getCanvasXY(e);
        const pos = getGridPos(x, y); if (!pos) return;
        const last = selectedPath[selectedPath.length-1];
        if (pos.r===last.r && pos.c===last.c) return;

        const color = grid[selectedPath[0].r][selectedPath[0].c].color;

        if (Math.abs(pos.r-last.r)+Math.abs(pos.c-last.c) !== 1) return;
        if (grid[pos.r][pos.c]?.color !== color) return;

        const idx = selectedPath.findIndex(p => p.r===pos.r && p.c===pos.c);

        if (idx === -1) {
            selectedPath.push(pos);
            playDotSound(selectedPath.length-1, isLooping);
        } else if (idx === selectedPath.length - 2) {
            selectedPath.pop();
            isLooping = false;
            loopStartPos = null;
        } else if (selectedPath.length >= 3) {
            selectedPath.push(pos);
            isLooping = true;
            loopStartPos = pos;
            playDotSound(selectedPath.length-1, true);
        }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
        if (showConfirm || !isDragging || isShuffling) return;
        isDragging=false;
        if (isLooping && selectedPath.length>=4 && loopStartPos) {
            // ★ループ完成時の処理★
            const color=grid[selectedPath[0].r][selectedPath[0].c].color;
            playClearSound(true);
            
            for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
                if(grid[r][c]?.color===color){
                    // 消えるドットの座標にパーティクルを生成（1ドットにつき8粒）
                    const dotX = c * SPACING + SPACING / 2;
                    const dotY = grid[r][c].visualY;
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(dotX, dotY, color));
                    }
                    grid[r][c]=null;
                    score++;
                }
            }
            dropDots(); ensurePossibleMoves();
        } else if (selectedPath.length>=2) {
            // 通常消しの処理（演出なし）
            playClearSound(false);
            new Set(selectedPath.map(p=>`${p.r},${p.c}`)).forEach(pt=>{
                const [r,c]=pt.split(',').map(Number);
                if(grid[r][c]){grid[r][c]=null;score++;}
            });
            dropDots(); ensurePossibleMoves();
        }
        updateScore(score);
        selectedPath=[]; isLooping=false; loopStartPos=null;
    }, {passive: false});

    // --- コントロール系 ---
    document.getElementById('undoBtn').addEventListener('click', () => {
        initAudio();
        if (isShuffling) return;
        if (history.length>0 && score>=UNDO_COST) {
            updateScore(score-UNDO_COST);
            grid = JSON.parse(history.pop()).grid;
        } else if (score<UNDO_COST) {
            scoreEl.style.color='#FF5252'; setTimeout(()=>scoreEl.style.color='#e0e0e0', 500);
        }
    });

    document.getElementById('resetBtn').addEventListener('click', () => { 
        initAudio();
        if(!isShuffling) showConfirm = true; 
    });

    function execReset() {
        if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
        elapsedSeconds=0; timerEl.innerText='00:00';
        updateScore(0);
        history=[]; selectedPath=[]; isDragging=false; isLooping=false; loopStartPos=null;
        particles = []; // リセット時にパーティクルも消す
        grid=[]; initGrid();
    }

    // --- ゲーム開始 ---
    canvas.width  = COLS * SPACING; canvas.height = ROWS * SPACING;
    initGrid(); scoreEl.innerText = score;
    requestAnimationFrame(draw);
</script>

</body>
</html>
