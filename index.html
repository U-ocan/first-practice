<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots Game - Original Sound Restoration</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            background: #121212; color: #e0e0e0; font-family: sans-serif; touch-action: none; 
        }
        #score-container { font-size: 28px; margin-bottom: 20px; font-weight: bold; }
        canvas { background: #1e1e1e; border-radius: 12px; cursor: crosshair; touch-action: none; }
        #controls { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border-radius: 30px; border: 1px solid #444; background: #2c2c2c; color: #fff; cursor: pointer; }
        button:active { background: #3d3d3d; }
        .cost-label { font-size: 0.8em; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="score-container">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
        <button onclick="undo()">Undo <span class="cost-label">(-5pts)</span></button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const ROWS = 6;
    const COLS = 6;
    const DOT_SIZE = 15;
    const SPACING = 50;
    const COLORS = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#9C27B0'];

    let grid = [];
    let score = 0;
    let selectedPath = [];
    let isDragging = false;
    let isLooping = false;
    let history = [];
    const UNDO_COST = 5;

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // --- 【完全復元】初期のサウンドロジック ---
    function playTone(index) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        // 初期の正確な音階上昇（1.059倍 = 半音ずつ上がる設定）
        osc.frequency.setValueAtTime(440 * Math.pow(1.059, index), audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        // 余韻の長さも初期の0.5秒に戻しました
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }

    function initGrid() {
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
        }
    }

    function saveState() {
        const state = { grid: grid.map(row => [...row]), score: score };
        history.push(JSON.stringify(state));
        if (history.length > 20) history.shift();
    }

    function undo() {
        initAudio();
        if (history.length > 0 && score >= UNDO_COST) {
            score -= UNDO_COST;
            const lastState = JSON.parse(history.pop());
            grid = lastState.grid;
            scoreEl.innerText = score;
            draw();
        } else if (score < UNDO_COST) {
            scoreEl.style.color = '#FF5252';
            setTimeout(() => scoreEl.style.color = '#e0e0e0', 500);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (selectedPath.length > 0) {
            ctx.beginPath();
            ctx.lineWidth = 6;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            const color = grid[selectedPath[0].r][selectedPath[0].c];
            ctx.strokeStyle = isLooping ? 'white' : color;
            selectedPath.forEach((p, i) => {
                const x = p.c * SPACING + SPACING / 2;
                const y = p.r * SPACING + SPACING / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) {
                    const x = c * SPACING + SPACING / 2;
                    const y = r * SPACING + SPACING / 2;
                    ctx.beginPath();
                    ctx.arc(x, y, DOT_SIZE, 0, Math.PI * 2);
                    ctx.fillStyle = grid[r][c];
                    ctx.fill();
                    if (selectedPath.some(p => p.r === r && p.c === c)) {
                        ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
                    }
                }
            }
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const c = Math.floor((clientX - rect.left) / SPACING);
        const r = Math.floor((clientY - rect.top) / SPACING);
        return (r >= 0 && r < ROWS && c >= 0 && c < COLS) ? {r, c} : null;
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        saveState();
        const pos = getPos(e);
        if (pos) { 
            isDragging = true; 
            selectedPath = [pos]; 
            playTone(0); 
            draw(); 
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const pos = getPos(e);
        if (!pos) return;

        const last = selectedPath[selectedPath.length - 1];
        if (pos.r === last.r && pos.c === last.c) return;

        const color = grid[selectedPath[0].r][selectedPath[0].c];
        const isNeighbor = Math.abs(pos.r - last.r) <= 1 && Math.abs(pos.c - last.c) <= 1;
        
        if (grid[pos.r][pos.c] === color && isNeighbor) {
            const alreadyIdx = selectedPath.findIndex(p => p.r === pos.r && p.c === pos.c);
            
            if (alreadyIdx === -1) {
                selectedPath.push(pos);
                isLooping = false;
                playTone(selectedPath.length - 1); // 繋ぐたびに鳴らす
                draw();
            } else if (alreadyIdx === 0 && selectedPath.length >= 3) {
                selectedPath.push(pos);
                isLooping = true;
                playTone(selectedPath.length + 2); // ループ時の少し高い音
                draw();
            }
        }
    });

    window.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        if (selectedPath.length >= 2) {
            const first = selectedPath[0];
            const last = selectedPath[selectedPath.length - 1];
            const isActuallyLoop = selectedPath.length >= 4 && first.r === last.r && first.c === last.c;
            const color = grid[first.r][first.c];

            if (isActuallyLoop) {
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (grid[r][c] === color) { grid[r][c] = null; score++; }
                    }
                }
            } else {
                selectedPath.forEach(p => { if (grid[p.r][p.c]) { grid[p.r][p.c] = null; score++; } });
            }
            dropDots();
            scoreEl.innerText = score;
        }
        selectedPath = []; isLooping = false; draw();
    });

    function dropDots() {
        for (let c = 0; c < COLS; c++) {
            let emptyRows = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r][c] === null) { emptyRows++; }
                else if (emptyRows > 0) { grid[r + emptyRows][c] = grid[r][c]; grid[r][c] = null; }
            }
            for (let r = 0; r < emptyRows; r++) { grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)]; }
        }
    }

    canvas.width = COLS * SPACING; 
    canvas.height = ROWS * SPACING;
    initGrid(); 
    draw();
</script>
</body>
</html>
