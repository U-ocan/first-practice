<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dots Game - Fixed Loop Detection</title>
    <style>
        body { 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            background: #121212; color: #e0e0e0; font-family: sans-serif; touch-action: none; 
        }
        #info-container { 
            display: flex; gap: 30px; font-size: 24px; margin-bottom: 20px; font-weight: bold; 
        }
        .info-item { min-width: 120px; text-align: center; }
        canvas { background: #1e1e1e; border-radius: 12px; cursor: crosshair; touch-action: none; }
        #controls { margin-top: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        button { padding: 14px 28px; font-size: 16px; border-radius: 30px; border: 1px solid #444; background: #2c2c2c; color: #fff; cursor: pointer; }
        button:active { background: #3d3d3d; }
        .cost-label { font-size: 0.8em; color: #aaa; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="info-container">
        <div class="info-item">Score: <span id="score">0</span></div>
        <div class="info-item">Time: <span id="timer">00:00</span></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="controls">
        <button onclick="undo()">Undo <span class="cost-label">(-5pts)</span></button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');

    const ROWS = 6;
    const COLS = 6;
    const DOT_SIZE = 13;
    const SPACING = 50;
    const COLORS = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#9C27B0'];

    let grid = [];
    let score = 0;
    let selectedPath = [];
    let isDragging = false;
    let isLooping = false;
    let loopStartPos = null; // ループの起点となるドットの位置を保持
    let history = [];
    const UNDO_COST = 5;

    let startTime;
    let timerInterval = null;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playDotSound(step, isSpecial = false) {
        if (!audioCtx) return;
        const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
        let freq = scale[Math.min(step, scale.length - 1)];
        if (isSpecial) freq *= 2.0;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    function playClearSound(isLoop = false) {
        if (!audioCtx) return;
        const freqs = isLoop ? [523.25, 659.25, 783.99, 1046.50] : [523.25, 659.25, 783.99];
        freqs.forEach(freq => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        });
    }

    function startTimer() {
        if (timerInterval) return;
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const secs = (elapsed % 60).toString().padStart(2, '0');
        timerEl.innerText = `${mins}:${secs}`;
    }

    function initGrid() {
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
            }
        }
        ensurePossibleMoves();
    }

    function hasPossibleMoves() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const color = grid[r][c];
                if (!color) continue;
                const neighbors = [ {r: r+1, c: c}, {r: r-1, c: c}, {r: r, c: c+1}, {r: r, c: c-1} ];
                for (let n of neighbors) {
                    if (n.r >= 0 && n.r < ROWS && n.c >= 0 && n.c < COLS) {
                        if (grid[n.r][n.c] === color) return true;
                    }
                }
            }
        }
        return false;
    }

    function shuffleGrid() {
        let allColors = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) allColors.push(grid[r][c]);
            }
        }
        for (let i = allColors.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allColors[i], allColors[j]] = [allColors[j], allColors[i]];
        }
        let idx = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                grid[r][c] = allColors[idx++];
            }
        }
    }

    function ensurePossibleMoves() {
        let attempts = 0;
        while (!hasPossibleMoves() && attempts < 100) {
            shuffleGrid();
            attempts++;
        }
    }

    function saveState() {
        const state = { grid: grid.map(row => [...row]), score: score };
        history.push(JSON.stringify(state));
        if (history.length > 20) history.shift();
    }

    function undo() {
        initAudio();
        if (history.length > 0 && score >= UNDO_COST) {
            score -= UNDO_COST;
            const lastState = JSON.parse(history.pop());
            grid = lastState.grid;
            scoreEl.innerText = score;
            draw();
        } else if (score < UNDO_COST) {
            scoreEl.style.color = '#FF5252';
            setTimeout(() => scoreEl.style.color = '#e0e0e0', 500);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (selectedPath.length > 0) {
            ctx.beginPath();
            ctx.lineWidth = 6;
            ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            const color = grid[selectedPath[0].r][selectedPath[0].c];
            ctx.strokeStyle = color; // パス自体はドットの色にする

            selectedPath.forEach((p, i) => {
                const x = p.c * SPACING + SPACING / 2;
                const y = p.r * SPACING + SPACING / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // ループ部分を強調表示（もしあれば）
            if (isLooping && loopStartPos) {
                ctx.beginPath();
                ctx.lineWidth = 8;
                ctx.strokeStyle = 'white';
                let startDrawing = false;
                selectedPath.forEach((p, i) => {
                    if (p.r === loopStartPos.r && p.c === loopStartPos.c) startDrawing = true;
                    if (startDrawing) {
                        const x = p.c * SPACING + SPACING / 2;
                        const y = p.r * SPACING + SPACING / 2;
                        if (i === selectedPath.findIndex(lp => lp.r === loopStartPos.r && lp.c === loopStartPos.c)) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                });
                ctx.stroke();
            }
        }
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c]) {
                    const x = c * SPACING + SPACING / 2;
                    const y = r * SPACING + SPACING / 2;
                    ctx.beginPath();
                    ctx.arc(x, y, DOT_SIZE, 0, Math.PI * 2);
                    ctx.fillStyle = grid[r][c];
                    ctx.fill();
                    // 選択中のドットに枠線
                    if (selectedPath.some(p => p.r === r && p.c === c)) {
                        ctx.lineWidth = 3; ctx.strokeStyle = 'white'; ctx.stroke();
                    }
                }
            }
        }
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const c = Math.floor((clientX - rect.left) / SPACING);
        const r = Math.floor((clientY - rect.top) / SPACING);
        return (r >= 0 && r < ROWS && c >= 0 && c < COLS) ? {r, c} : null;
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        initAudio();
        startTimer();
        saveState();
        const pos = getPos(e);
        if (pos && grid[pos.r][pos.c]) { // ドットが存在する場合のみ開始
            isDragging = true; 
            selectedPath = [pos]; 
            isLooping = false;
            loopStartPos = null;
            playDotSound(0);
            draw(); 
        }
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const pos = getPos(e); if (!pos) return;
        const last = selectedPath[selectedPath.length - 1];
        if (pos.r === last.r && pos.c === last.c) return;
        
        const color = grid[selectedPath[0].r][selectedPath[0].c];
        const rDiff = Math.abs(pos.r - last.r);
        const cDiff = Math.abs(pos.c - last.c);
        
        // 斜め移動禁止（上下左右のみ、距離が1）
        if (grid[pos.r][pos.c] === color && (rDiff + cDiff === 1)) {
            // 現在のパス内で、移動先のドットが既に踏まれているかチェック
            const alreadyIdx = selectedPath.findIndex(p => p.r === pos.r && p.c === pos.c);
            
            if (alreadyIdx === -1) {
                // まだ踏んでいないドット（直線）
                selectedPath.push(pos);
                // 直線状にあったとしても、もし既にループ中ならループ継続
                if (isLooping) {
                    playDotSound(selectedPath.length - 1, true); // 特殊音
                } else {
                    playDotSound(selectedPath.length - 1); // 通常音
                }
                draw();
            } else if (selectedPath.length >= 3 && alreadyIdx !== selectedPath.length - 2) {
                // 踏んだことのあるドットで、直前のドットではない（ループ形成）
                selectedPath.push(pos);
                isLooping = true;
                loopStartPos = pos; // このドットをループの起点にする
                playDotSound(selectedPath.length - 1, true); // 特殊音
                draw();
            }
        }
    });

    window.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false;
        
        // ループ判定がONで、かつパスが正しく形成されている場合
        if (isLooping && selectedPath.length >= 4 && loopStartPos) {
            const first = selectedPath[0];
            const color = grid[first.r][first.c];
            playClearSound(true); // 消去時の和音（ループ用）

            // 画面上の同じ色のドットを全て消す
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === color) {
                        grid[r][c] = null;
                        score++;
                    }
                }
            }
            dropDots();
            ensurePossibleMoves();
            scoreEl.innerText = score;
        } else if (selectedPath.length >= 2) {
            // ループではない場合（通常の消去）
            playClearSound(false); // 消去時の和音（通常用）
            // 選択されたドットのみ消す（ダブりを防ぐためにSetを使用）
            const ptsToRemove = new Set(selectedPath.map(p => `${p.r},${p.c}`));
            ptsToRemove.forEach(pt => {
                const [r, c] = pt.split(',').map(Number);
                if (grid[r][c]) {
                    grid[r][c] = null;
                    score++;
                }
            });
            dropDots();
            ensurePossibleMoves();
            scoreEl.innerText = score;
        }
        
        selectedPath = []; isLooping = false; loopStartPos = null; draw();
    });

    function dropDots() {
        for (let c = 0; c < COLS; c++) {
            let empty = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r][c] === null) empty++;
                else if (empty > 0) { grid[r + empty][c] = grid[r][c]; grid[r][c] = null; }
            }
            for (let r = 0; r < empty; r++) grid[r][c] = COLORS[Math.floor(Math.random() * COLORS.length)];
        }
    }

    canvas.width = COLS * SPACING; canvas.height = ROWS * SPACING;
    initGrid(); draw();
</script>
</body>
</html>
